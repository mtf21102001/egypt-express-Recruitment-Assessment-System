version: '3.8'
services:
  backend:
    build: .
    container_name: recruitment_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: recruitment_tunnel
    command: tunnel --url http://backend:3000
    restart: always
    depends_on:
      - backend
